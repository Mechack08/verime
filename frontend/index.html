<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeriMe — Private Age Credentials</title>
    <meta name="description" content="Prove your age without revealing your identity. Zero-knowledge credentials on the Midnight Network." />
    <meta name="theme-color" content="#0A0A12" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Synchronous polyfill — must run before any ES module (Midnight WASM reads process).
      (function () {
        var g = typeof globalThis !== "undefined" ? globalThis : window;
        g.global = g.global || g;
        if (!g.process) {
          g.process = {
            env: {},
            browser: true,
            version: "",
            versions: { node: "0.0.0" },
            nextTick: function (fn) {
              queueMicrotask(fn);
            },
          };
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
